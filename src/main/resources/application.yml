spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DDB_PW}
logging:
  config: classpath:static/log4j2/log4j2_local.xml
---
#stg 구분
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DDB_PW}
  config:
    activate:
      on-profile: stg
logging:
  config: classpath:static/log4j2/log4j2_stg.xml
---
#main 구분
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DDB_PW}
  config:
    activate:
      on-profile: main
logging:
  config: classpath:static/log4j2/log4j2_main.xml